# Publishes typescript/ (@voltcast/sdk) to npm with provenance.
# Requires npm Trusted Publishing for this repo+workflow, or an NPM_TOKEN secret.
name: Publish TypeScript SDK to npm

on:
  release:
    types: [published]
  workflow_dispatch:

jobs:
  publish:
    if: github.event_name == 'workflow_dispatch' || startsWith(github.event.release.tag_name, 'sdk-ts-v')
    runs-on: ubuntu-latest
    environment: npm
    permissions:
      id-token: write
      contents: read
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "22"
          registry-url: "https://registry.npmjs.org"

      - name: Build
        working-directory: typescript
        run: |
          npm ci
          npm run build

      - name: Publish
        working-directory: typescript
        run: npm publish --provenance --access public
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
